# Complexity thresholds for CI quality gates (GH#5628)
#
# These values are read by .github/workflows/code-quality.yml.
# After each batch of simplification-debt PRs merges, lower these
# thresholds to ratchet down complexity over time.
#
# Format: KEY=VALUE (no spaces around =, no quotes needed)
# Lines starting with # are comments.
#
# Full change history: complexity-thresholds-history.md

# Shell function complexity: functions with >100 lines
# Baseline: 404 (2026-03-24) → ratcheted to 31 (GH#17875): 29 violations + 2 buffer
# Bumped to 36 (GH#17969): pre-existing regression on main — 34 violations vs threshold 31; 34 + 2 buffer
# Bumped to 40 (GH#18037): pre-existing regression on main — 38 violations vs threshold 36; 38 + 2 buffer
FUNCTION_COMPLEXITY_THRESHOLD=40

# Shell nesting depth: files with >8 levels of nesting
# NOTE: pulse-wrapper.sh has a proximity guard (GH#17808) that warns when
# violations are within 5 of this threshold. Bump this value AND document the
# reason in complexity-thresholds-history.md when adding scripts that push the
# count over the current value.
# Counting methodology: violations are counted using lint_shell_files() from
# lint-file-discovery.sh (same file set as CI), not a raw find/glob. This
# excludes vendor, node_modules, and non-shell files — yielding 246, not ~309.
#
# Recent history (full log in complexity-thresholds-history.md):
# Bumped to 263 (GH#17978): proximity guard firing at 256/258 (2 headroom); 256 violations + 7 headroom
# Ratcheted down to 258 (GH#17992): actual violations 256 + 2 buffer
# Ratcheted down to 247 (GH#18009): actual violations 245 + 2 buffer
# Bumped to 252 (GH#18013): proximity guard firing at 245/247 (2 headroom); 245 violations + 7 headroom
# Ratcheted down to 247 (GH#18016): actual violations 245 + 2 buffer
# Bumped to 252 (GH#18020): proximity guard firing at 245/247 (2 headroom); 245 violations + 7 headroom
# Ratcheted down to 247 (GH#18028): actual violations 245 + 2 buffer
# Bumped to 252 (GH#18056): proximity guard firing at 245/247 (2 headroom); 245 violations + 7 headroom
# Ratcheted down to 247 (GH#18067): actual violations 245 + 2 buffer
# Bumped to 253 (GH#18075): proximity guard firing at 246/247 (1 headroom); 246 violations + 7 headroom; warn_at=248, guard fires when violations exceed 248 (i.e., at 249)
NESTING_DEPTH_THRESHOLD=253

# File size: files with >1500 lines
# Current baseline: 53 (as of 2026-03-25, pre-existing on main)
# Bumped to 56 (GH#17969): pre-existing regression on main — 54 violations vs threshold 53; 54 + 2 buffer
FILE_SIZE_THRESHOLD=56

# Bash 3.2 compatibility: "\n"/"\t" in double-quoted strings, associative
# arrays (bash 4.0+), and namerefs (bash 4.3+). GH#17371.
# Baseline: 69 (2026-04-04) → bumped to 72 (GH#17830): pre-existing regression;
# email-delivery-test-helper.sh and memory-pressure-monitor.sh added
# namerefs/associative arrays. Proper fix is to refactor those scripts.
BASH32_COMPAT_THRESHOLD=72
